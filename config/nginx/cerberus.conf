# =============================================================================
# Cerberus Pi — Nginx reverse proxy (Phase 9 / Phase 10)
# Install to /etc/nginx/sites-available/cerberus.conf and symlink into
# sites-enabled. HTTPS only; HTTP redirects. Serves the React build and proxies
# /api + /ws to Daphne. Bound to the management interface only (Constraint #1).
# =============================================================================

# Daphne ASGI upstream (Unix socket — no TCP exposure).
upstream cerberus_asgi {
    server unix:/run/cerberus/daphne.sock;
}

# HTTP → HTTPS redirect.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name cerberus.local;

    # Self-signed cert generated at install (or operator-provided).
    ssl_certificate     /opt/cerberus/secrets/cerberus.crt;
    ssl_certificate_key /opt/cerberus/secrets/cerberus.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 25m;

    # --- React SPA (built assets) -------------------------------------------
    root /opt/cerberus/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API ----------------------------------------------------------------
    location /api/ {
        proxy_pass http://cerberus_asgi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /admin/ {
        proxy_pass http://cerberus_asgi;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- WebSockets (threats + engine) --------------------------------------
    location /ws/ {
        proxy_pass http://cerberus_asgi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
    }

    # --- Django static --------------------------------------------------------
    location /static/ {
        alias /opt/cerberus/backend/staticfiles/;
    }
}
